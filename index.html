<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice to Text — Bangla & English</title>
<style>
  :root {
    --bg: #0b141a;
    --panel: #111b21;
    --bubble: #005c4b;
    --bubble-alt: #202c33;
    --text: #e9edef;
    --muted: #8696a0;
    --accent: #00a884;
    --danger: #f15c6d;
    --border: #2a3942;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--panel);
  }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--accent);
    display: grid;
    place-items: center;
    font-weight: 700;
    color: #fff;
  }
  header h1 {
    font-size: 16px;
    margin: 0;
    font-weight: 600;
  }
  header .sub {
    font-size: 12px;
    color: var(--muted);
  }
  header .title-wrap { flex: 1; min-width: 0; }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .icon-btn:hover { background: var(--bubble-alt); }
  .icon-btn svg { width: 18px; height: 18px; }
  .settings-panel {
    background: var(--bubble-alt);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.2s ease, padding 0.2s ease;
  }
  .settings-panel.open {
    padding: 12px 16px;
    max-height: 260px;
  }
  .settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
    gap: 12px;
  }
  .settings-row input[type="number"] {
    width: 90px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 13px;
    outline: none;
  }
  .settings-row input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
  }
  .settings-note {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  .chat {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 85%;
    align-self: flex-end;
    background: var(--bubble);
    padding: 10px 14px;
    border-radius: var(--radius);
    border-bottom-right-radius: 4px;
    box-shadow: 0 1px 1px rgba(0,0,0,0.15);
    font-size: 15px;
    line-height: 1.45;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .msg.live {
    background: var(--bubble-alt);
    border: 1px solid var(--accent);
    animation: livePulse 1.4s infinite;
  }
  .msg.live .live-text { color: var(--text); opacity: 0.95; }
  @keyframes livePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0, 168, 132, 0.35); }
    50% { box-shadow: 0 0 0 4px rgba(0, 168, 132, 0.0); }
  }
  .msg .row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .play-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.12);
    color: #fff;
    cursor: pointer;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  .play-btn:hover { background: rgba(255,255,255,0.2); }
  .play-btn svg { width: 16px; height: 16px; }
  .wave {
    flex: 1;
    height: 32px;
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    overflow: hidden;
  }
  .wave canvas { width: 100%; height: 100%; display: block; }
  .meta {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    margin-top: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .transcript-toggle {
    background: none;
    border: none;
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
  }
  .transcript {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.15);
    font-size: 14px;
    line-height: 1.4;
    display: none;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .transcript.open { display: block; }
  .transcript .lang {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .status-pill {
    display: inline-block;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 8px;
    background: rgba(255,255,255,0.15);
    margin-left: 6px;
  }
  .status-pill.err { background: var(--danger); }

  .composer {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel);
    position: sticky;
    bottom: 0;
  }
  .lang-select {
    background: var(--bubble-alt);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
  }
  .hint {
    flex: 1;
    color: var(--muted);
    font-size: 13px;
    user-select: none;
  }
  .record-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: transform 0.1s ease, background 0.2s ease;
    box-shadow: 0 4px 12px rgba(0, 168, 132, 0.35);
    -webkit-tap-highlight-color: transparent;
  }
  .record-btn:active { transform: scale(0.95); }
  .record-btn.recording {
    background: var(--danger);
    animation: pulse 1.2s infinite;
  }
  .record-btn svg { width: 22px; height: 22px; grid-area: 1 / 1; }
  .record-btn .icon-stop { display: none; }
  .record-btn.recording .icon-mic { display: none; }
  .record-btn.recording .icon-stop { display: block; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 12px rgba(241, 92, 109, 0.45); }
    50% { box-shadow: 0 4px 24px rgba(241, 92, 109, 0.85); }
  }

  .rec-overlay {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bubble-alt);
    color: #fff;
    padding: 12px 18px;
    border-radius: 24px;
    font-size: 14px;
    display: none;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    z-index: 10;
  }
  .rec-overlay.on { display: flex; }
  .rec-overlay .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--danger);
    animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0.3; } }
  .rec-overlay .cancel-btn {
    margin-left: 8px;
    background: rgba(241, 92, 109, 0.18);
    color: var(--danger);
    border: 1px solid rgba(241, 92, 109, 0.5);
    border-radius: 14px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .rec-overlay .cancel-btn:hover { background: rgba(241, 92, 109, 0.28); }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px 20px;
    font-size: 14px;
  }
  .banner {
    margin: 12px 16px 0;
    padding: 10px 12px;
    border-radius: 8px;
    background: rgba(241, 92, 109, 0.15);
    color: var(--danger);
    font-size: 13px;
    border: 1px solid rgba(241, 92, 109, 0.4);
    display: none;
  }
  .banner.on { display: block; }

  @media (max-width: 380px) {
    header { padding: 12px 14px; }
    .chat { padding: 12px; }
    .composer { padding: 10px 12px; gap: 8px; }
    .record-btn { width: 52px; height: 52px; }
    .hint { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="avatar">VT</div>
    <div class="title-wrap">
      <h1>Voice to Text</h1>
      <div class="sub">Bangla &amp; English transcription</div>
    </div>
    <button id="settingsBtn" class="icon-btn" type="button" aria-label="Settings" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33h0a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51h0a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82v0a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path>
      </svg>
    </button>
  </header>

  <div id="settingsPanel" class="settings-panel">
    <label class="settings-row">
      <span>Auto-punctuation</span>
      <input type="checkbox" id="setAutoPunct" />
    </label>
    <label class="settings-row">
      <span>কমা'র জন্য pause (ms)</span>
      <input type="number" id="setPauseComma" min="500" max="5000" step="100" />
    </label>
    <label class="settings-row">
      <span>নতুন লাইনের জন্য pause (ms)</span>
      <input type="number" id="setPauseNewline" min="1000" max="10000" step="100" />
    </label>
    <label class="settings-row">
      <span>Timestamp দেখাবে</span>
      <input type="checkbox" id="setShowTimestamps" />
    </label>
    <div class="settings-note">পরিবর্তন auto-save হয়</div>
  </div>

  <div id="banner" class="banner"></div>

  <main id="chat" class="chat">
    <div id="empty" class="empty">
      মাইক বাটনে চাপ দিয়ে বাংলায় কথা বলুন।<br />
      আবার চাপ দিলে থেমে যাবে ও টেক্সট আকারে দেখাবে।<br />
      বাতিল করতে রেকর্ডিং চলাকালীন "বাতিল" বাটন চাপুন।
    </div>
  </main>

  <div id="recOverlay" class="rec-overlay">
    <span class="dot"></span>
    <span id="recTimer">0:00</span>
    <button id="cancelBtn" class="cancel-btn" type="button">বাতিল</button>
  </div>

  <div class="composer">
    <div class="hint">মাইক চেপে শুরু/বন্ধ করুন · max 10 min</div>
    <button id="recBtn" class="record-btn" type="button" title="Tap to start/stop" aria-label="Start recording">
      <svg class="icon-mic" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 14a3 3 0 003-3V6a3 3 0 10-6 0v5a3 3 0 003 3z"/>
        <path d="M19 11a1 1 0 10-2 0 5 5 0 01-10 0 1 1 0 10-2 0 7 7 0 006 6.92V21h-2a1 1 0 100 2h6a1 1 0 100-2h-2v-3.08A7 7 0 0019 11z"/>
      </svg>
      <svg class="icon-stop" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    </button>
  </div>
</div>

<script>
(() => {
  "use strict";

  const MAX_DURATION_MS = 600_000;
  const LANG = "bn-BD";

  const DEFAULT_SETTINGS = {
    autoPunctuation: true,
    pauseCommaMs: 1500,
    pauseNewlineMs: 3000,
    showTimestamps: true,
  };
  function loadSettings() {
    try {
      const raw = JSON.parse(localStorage.getItem("vtt_settings"));
      return { ...DEFAULT_SETTINGS, ...(raw || {}) };
    } catch {
      return { ...DEFAULT_SETTINGS };
    }
  }
  function saveSettings() {
    try { localStorage.setItem("vtt_settings", JSON.stringify(settings)); } catch {}
  }
  const settings = loadSettings();

  function computeSeparator(gapMs) {
    if (state.committedText === "") return "";
    if (!settings.autoPunctuation) return " ";
    if (gapMs >= settings.pauseNewlineMs) return "।\n";
    if (gapMs >= settings.pauseCommaMs) return ", ";
    return " ";
  }

  const chatEl = document.getElementById("chat");
  const emptyEl = document.getElementById("empty");
  const recBtn = document.getElementById("recBtn");
  const cancelBtn = document.getElementById("cancelBtn");
  const recOverlay = document.getElementById("recOverlay");
  const recTimer = document.getElementById("recTimer");
  const bannerEl = document.getElementById("banner");
  const settingsBtn = document.getElementById("settingsBtn");
  const settingsPanel = document.getElementById("settingsPanel");
  const setAutoPunct = document.getElementById("setAutoPunct");
  const setPauseComma = document.getElementById("setPauseComma");
  const setPauseNewline = document.getElementById("setPauseNewline");
  const setShowTimestamps = document.getElementById("setShowTimestamps");

  const state = {
    recognition: null,
    finalText: "",
    interimText: "",
    committedText: "",
    sessionFinalText: "",
    lastUtteranceEndAt: 0,
    startedAt: 0,
    timerId: 0,
    maxId: 0,
    cancelled: false,
    isRecording: false,
    shouldRestart: false,
    liveBubble: null,
    liveTextEl: null,
    restartCount: 0,
    lastRestartAt: 0,
  };

  function showBanner(msg) {
    bannerEl.textContent = msg;
    bannerEl.classList.add("on");
    clearTimeout(showBanner._t);
    showBanner._t = setTimeout(() => bannerEl.classList.remove("on"), 4000);
  }

  function fmtTime(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const r = s % 60;
    return `${m}:${String(r).padStart(2, "0")}`;
  }

  function fmtClock(d) {
    const h = d.getHours();
    const m = d.getMinutes();
    const s = d.getSeconds();
    const period = h >= 12 ? "PM" : "AM";
    const h12 = ((h + 11) % 12) + 1;
    return `${h12}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")} ${period}`;
  }

  function buildRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const rec = new SR();
    rec.lang = LANG;
    // continuous=false is more reliable on mobile Chrome: each utterance ends
    // cleanly and we immediately restart for the next one. continuous=true is
    // poorly supported on mobile and tends to silently stop after ~30s.
    rec.continuous = false;
    rec.interimResults = true;
    rec.maxAlternatives = 1;

    rec.onresult = (e) => {
      let sessionFinal = "";
      let interim = "";
      for (let i = 0; i < e.results.length; i++) {
        const transcript = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          sessionFinal += transcript;
        } else {
          interim += transcript;
        }
      }
      state.sessionFinalText = sessionFinal.trim();
      const previewSep = state.committedText && state.sessionFinalText ? " " : "";
      state.finalText = state.committedText + previewSep + state.sessionFinalText;
      state.interimText = interim;
      updateLiveBubble();
    };

    rec.onerror = (e) => {
      const code = e && e.error;
      console.warn("[SR] error", code, e);
      if (code === "not-allowed" || code === "service-not-allowed") {
        showBanner("Microphone permission denied.");
        state.shouldRestart = false;
        finalizeBubble(true);
        cleanupRecording();
      } else if (code === "no-speech" || code === "aborted" || code === "network" || code === "audio-capture") {
        // let onend handle restart
      } else if (code) {
        showBanner("Recognition error: " + code);
      }
    };

    rec.onend = () => {
      if (!state.isRecording) return;

      const now = performance.now();
      if (state.sessionFinalText) {
        const gap = state.lastUtteranceEndAt ? now - state.lastUtteranceEndAt : 0;
        const sep = computeSeparator(gap);
        const stamp = settings.showTimestamps ? ` (${fmtClock(new Date())})` : "";
        state.committedText = state.committedText.replace(/\s+$/, "") + sep + state.sessionFinalText + stamp;
        state.lastUtteranceEndAt = now;
      }
      state.sessionFinalText = "";
      state.finalText = state.committedText;
      state.interimText = "";

      if (!state.shouldRestart) {
        finalizeBubble(state.cancelled);
        cleanupRecording();
        return;
      }

      // Loop guard: if we're restarting too fast (browser is rejecting starts),
      // back off to avoid a tight failure loop.
      if (now - state.lastRestartAt < 300) {
        state.restartCount++;
      } else {
        state.restartCount = 0;
      }
      state.lastRestartAt = now;
      if (state.restartCount > 8) {
        showBanner("রেকর্ডিং বন্ধ হয়ে গেছে। আবার মাইক চাপুন।");
        state.shouldRestart = false;
        finalizeBubble(false);
        cleanupRecording();
        return;
      }

      const next = buildRecognition();
      if (!next) { cleanupRecording(); return; }
      state.recognition = next;
      try {
        next.start();
      } catch (err) {
        console.warn("[SR] restart failed", err);
        setTimeout(() => {
          if (!state.isRecording || !state.shouldRestart) return;
          try { next.start(); } catch (err2) {
            console.warn("[SR] restart retry failed", err2);
            showBanner("রেকর্ডিং চালু রাখা গেল না। আবার চেষ্টা করুন।");
            state.shouldRestart = false;
            finalizeBubble(false);
            cleanupRecording();
          }
        }, 200);
      }
    };

    return rec;
  }

  function startRecording() {
    if (state.isRecording) return;
    const rec = buildRecognition();
    if (!rec) {
      showBanner("Web Speech API not supported. Use Chrome or Edge.");
      return;
    }

    state.finalText = "";
    state.interimText = "";
    state.committedText = "";
    state.sessionFinalText = "";
    state.lastUtteranceEndAt = 0;
    state.cancelled = false;
    state.startedAt = performance.now();
    state.isRecording = true;
    state.shouldRestart = true;
    state.restartCount = 0;
    state.lastRestartAt = 0;
    state.recognition = rec;

    createLiveBubble();

    try {
      rec.start();
    } catch (err) {
      showBanner("Could not start: " + (err && err.message ? err.message : ""));
      cleanupRecording();
      return;
    }

    recBtn.classList.add("recording");
    recBtn.setAttribute("aria-label", "Stop recording");
    recOverlay.classList.add("on");
    recTimer.textContent = "0:00";

    state.timerId = setInterval(() => {
      const elapsed = performance.now() - state.startedAt;
      recTimer.textContent = fmtTime(elapsed);
    }, 200);

    state.maxId = setTimeout(() => stopRecording(false), MAX_DURATION_MS);
  }

  function stopRecording(cancel) {
    if (!state.isRecording) return;
    state.cancelled = !!cancel;
    state.shouldRestart = false;
    clearInterval(state.timerId);
    clearTimeout(state.maxId);
    recBtn.classList.remove("recording");
    recBtn.setAttribute("aria-label", "Start recording");
    recOverlay.classList.remove("on");
    try { state.recognition && state.recognition.stop(); } catch (_) {}
  }

  function cleanupRecording() {
    state.isRecording = false;
    state.shouldRestart = false;
    state.recognition = null;
    state.liveBubble = null;
    state.liveTextEl = null;
    state.finalText = "";
    state.interimText = "";
    state.committedText = "";
    state.sessionFinalText = "";
    state.lastUtteranceEndAt = 0;
    state.restartCount = 0;
    state.lastRestartAt = 0;
  }

  function createLiveBubble() {
    emptyEl.style.display = "none";
    const msg = document.createElement("div");
    msg.className = "msg live";
    const txt = document.createElement("div");
    txt.className = "live-text";
    txt.textContent = "শুনছি…";
    msg.appendChild(txt);
    chatEl.appendChild(msg);
    chatEl.scrollTop = chatEl.scrollHeight;
    state.liveBubble = msg;
    state.liveTextEl = txt;
  }

  function updateLiveBubble() {
    if (!state.liveTextEl) return;
    const combined = (state.finalText + state.interimText).trim();
    state.liveTextEl.textContent = combined || "শুনছি…";
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function finalizeBubble(cancelled) {
    if (!state.liveBubble) return;
    const text = state.finalText.trim();
    if (cancelled || !text) {
      state.liveBubble.remove();
      if (!cancelled && !text) showBanner("কিছু শোনা যায়নি। আবার চেষ্টা করুন।");
      if (!chatEl.querySelector(".msg")) emptyEl.style.display = "";
      return;
    }
    state.liveBubble.classList.remove("live");
    state.liveTextEl.classList.remove("live-text");
    state.liveTextEl.textContent = text;
  }

  function toggleRecording() {
    if (state.isRecording) {
      stopRecording(false);
    } else {
      startRecording();
    }
  }

  recBtn.addEventListener("click", toggleRecording);
  cancelBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    stopRecording(true);
  });

  setAutoPunct.checked = settings.autoPunctuation;
  setPauseComma.value = settings.pauseCommaMs;
  setPauseNewline.value = settings.pauseNewlineMs;
  setShowTimestamps.checked = settings.showTimestamps;

  settingsBtn.addEventListener("click", () => {
    settingsPanel.classList.toggle("open");
  });
  setAutoPunct.addEventListener("change", (e) => {
    settings.autoPunctuation = e.target.checked;
    saveSettings();
  });
  setPauseComma.addEventListener("change", (e) => {
    const v = Number(e.target.value);
    settings.pauseCommaMs = Number.isFinite(v) && v >= 500 ? v : DEFAULT_SETTINGS.pauseCommaMs;
    e.target.value = settings.pauseCommaMs;
    saveSettings();
  });
  setPauseNewline.addEventListener("change", (e) => {
    const v = Number(e.target.value);
    settings.pauseNewlineMs = Number.isFinite(v) && v >= 1000 ? v : DEFAULT_SETTINGS.pauseNewlineMs;
    e.target.value = settings.pauseNewlineMs;
    saveSettings();
  });
  setShowTimestamps.addEventListener("change", (e) => {
    settings.showTimestamps = e.target.checked;
    saveSettings();
  });

  window.addEventListener("beforeunload", () => {
    stopRecording(true);
  });
})();
</script>
</body>
</html>
